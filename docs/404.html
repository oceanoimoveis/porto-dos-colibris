<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina nao encontrada | Porto dos Colibris</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(140deg, #f4f0e6, #ece7d6);
      color: #1c2a20;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 420px;
      box-shadow: 0 18px 40px rgba(17, 52, 27, 0.14);
    }
    h1 { font-size: 56px; margin: 0 0 8px; color: #1f4d2c; letter-spacing: -0.04em; }
    p { color: #4a5b50; margin: 0 0 18px; }
    a {
      display: inline-flex; gap: 8px; align-items: center;
      background: linear-gradient(135deg, #e87917, #f59342);
      color: #fff; padding: 12px 22px; border-radius: 999px;
      font-weight: 700; text-decoration: none;
      box-shadow: 0 10px 24px rgba(232, 121, 23, 0.28);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>A pagina que voce procurou nao existe ou foi movida.</p>
    <a href="./">Voltar para a pagina inicial</a>
  </div>
</body>
</html>
